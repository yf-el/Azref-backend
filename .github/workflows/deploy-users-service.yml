name: Deploy users-service

on:
  push:
    branches: [main]
    paths:
      - 'services/users-service/**'
      - 'libs/**'
      - '.github/workflows/deploy-users-service.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: azref-dev/users-service
  INSTANCE_TAG_NAME: azref-dev-users-service

# OIDC requires write permission on id-token
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build \
            -f services/users-service/Dockerfile \
            -t "$IMAGE_URI" \
            -t "$LATEST_URI" \
            .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Pushed: $IMAGE_URI"

      - name: Trigger deploy via SSM Run Command (tag-based targeting)
        id: deploy
        env:
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=${INSTANCE_TAG_NAME}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy users-service @ ${IMAGE_TAG:0:7}" \
            --parameters "commands=['/opt/azref/deploy.sh $IMAGE_TAG']" \
            --query "Command.CommandId" \
            --output text)
          echo "Sent SSM command: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM command to complete
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
        run: |
          # SSM needs a moment to assign the command to the targeted instance(s)
          sleep 5

          INSTANCE_IDS=$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --query 'CommandInvocations[].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instances matched the tag '${INSTANCE_TAG_NAME}'."
            exit 1
          fi

          echo "Waiting on instances: $INSTANCE_IDS"

          for INSTANCE_ID in $INSTANCE_IDS; do
            for i in {1..40}; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query Status --output text 2>/dev/null || echo "Pending")
              echo "[$INSTANCE_ID] Attempt $i: $STATUS"

              case "$STATUS" in
                Success)
                  break
                  ;;
                Failed|Cancelled|TimedOut)
                  echo "Deploy failed on $INSTANCE_ID with status: $STATUS"
                  aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "$INSTANCE_ID"
                  exit 1
                  ;;
              esac

              if [ "$i" -eq 40 ]; then
                echo "Timed out on $INSTANCE_ID after ~7 minutes"
                exit 1
              fi
              sleep 10
            done
          done

          echo "All instances reported Success."
