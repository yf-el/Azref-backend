services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: azref
      POSTGRES_PASSWORD: azref
      POSTGRES_DB: azref
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azref"]
      interval: 5s
      timeout: 3s
      retries: 10

  users-service:
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://azref:azref@postgres:5432/azref
      LOG_LEVEL: INFO
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/users-service/app:/app/app
      - ./libs:/libs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app --reload-dir /libs

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    environment:
      STAGE: dev
      LOG_LEVEL: INFO
      DATABASE_URL: ${AGENT_DATABASE_URL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CORS_ORIGINS: ${AGENT_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8001:8000"
    volumes:
      - ./services/agent/app:/app/app
      - ./libs:/libs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app --reload-dir /libs

volumes:
  postgres_data:
