services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: azref
      POSTGRES_PASSWORD: azref
      POSTGRES_DB: azref
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azref"]
      interval: 5s
      timeout: 3s
      retries: 10

  users-service:
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://azref:azref@postgres:5432/azref
      LOG_LEVEL: INFO
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/users-service/app:/app/app
      - ./libs:/libs

volumes:
  postgres_data:
